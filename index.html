<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>轉生史萊姆：系統崩壞</title>
    <style>
        :root {
            --term-green: #0f0;
            --term-red: #f00;
            --bg-color: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 1. CRT 掃描線濾鏡 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.8;
        }

        /* 2. 前言畫面 */
        #prologue-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        #prologue-image {
            width: 150px; height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
            transition: opacity 1s, filter 1s;
        }
        .glow-green { filter: drop-shadow(0 0 15px var(--term-green)); }
        .glow-red { filter: drop-shadow(0 0 25px var(--term-red)) hue-rotate(320deg); }

        /* 3. 戰鬥畫面佈局 */
        #game-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* 戰鬥區 (上) */
        #battle-area {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid var(--term-green);
        }

        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .char-img {
            width: 120px; height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        #player-img { transform: scaleX(-1); filter: drop-shadow(0 0 10px var(--term-green)); }
        #enemy-img { filter: drop-shadow(0 0 20px var(--term-red)); }

        /* 血條設計 */
        .hp-bar-container {
            width: 100%; height: 15px;
            border: 1px solid var(--term-green);
            margin-top: 5px;
        }
        .hp-bar {
            height: 100%; background-color: var(--term-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        #enemy-hp-bar.low-hp { background-color: var(--term-red); }

        /* 終端機對話框 (下) */
        #terminal-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            background-color: rgba(0, 20, 0, 0.3);
        }

        /* 按鈕區 (置於文字上方防遮擋) */
        #action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background: transparent;
            color: var(--term-green);
            border: 1px solid var(--term-green);
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: var(--term-green); color: black; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* 文字紀錄區 (滾動) */
        #log-container {
            flex: 1;
            overflow-y: auto;
            border-top: 1px dashed #333;
            padding-top: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 5px; }
        .log-sys { color: #888; }
        .log-dmg { color: var(--term-red); font-weight: bold; }

        /* --- CSS 動畫區 --- */
        
        /* 衝刺動畫 (電腦版 X 軸) */
        @keyframes dash-player-desktop { 0% { transform: scaleX(-1) translateX(0) scale(1); } 50% { transform: scaleX(-1) translateX(100px) scale(1.2); } 100% { transform: scaleX(-1) translateX(0) scale(1); } }
        @keyframes dash-enemy-desktop { 0% { transform: translateX(0) scale(1); } 50% { transform: translateX(-100px) scale(1.2); } 100% { transform: translateX(0) scale(1); } }
        
        /* 衝刺動畫 (手機版 Y 軸) */
        @keyframes dash-player-mobile { 0% { transform: scaleX(-1) translateY(0) scale(1); } 50% { transform: scaleX(-1) translateY(-80px) scale(1.2); } 100% { transform: scaleX(-1) translateY(0) scale(1); } }
        @keyframes dash-enemy-mobile { 0% { transform: translateY(0) scale(1); } 50% { transform: translateY(80px) scale(1.2); } 100% { transform: translateY(0) scale(1); } }

        .anim-dash-player { animation: dash-player-desktop 0.3s ease-in-out; }
        .anim-dash-enemy { animation: dash-enemy-desktop 0.3s ease-in-out; }

        /* 受擊亂碼特效 */
        @keyframes glitch {
            0% { transform: translate(0); filter: invert(0); }
            20% { transform: translate(-5px, 5px) skewX(20deg); filter: invert(1) hue-rotate(90deg); }
            40% { transform: translate(5px, -5px) skewX(-20deg); filter: brightness(2); }
            60% { transform: translate(-2px, 2px); filter: invert(1); }
            80% { transform: translate(2px, -2px) skewX(10deg); filter: hue-rotate(180deg); }
            100% { transform: translate(0); filter: invert(0); }
        }
        .anim-glitch { animation: glitch 0.4s steps(2); }

        /* 戰敗掉落 */
        @keyframes die {
            0% { transform: translateY(0); filter: grayscale(0); opacity: 1; }
            100% { transform: translateY(200px) rotate(45deg); filter: grayscale(1); opacity: 0; }
        }
        .anim-die { animation: die 1s forwards ease-in; }

        /* RWD: 手機版改為上下排列 (魔王在上) */
        @media (max-width: 768px) {
            #battle-area { flex-direction: column; justify-content: center; gap: 30px; }
            .character { width: 80%; }
            
            /* 覆寫為垂直衝刺 */
            .anim-dash-player { animation: dash-player-mobile 0.3s ease-in-out; }
            .anim-dash-enemy { animation: dash-enemy-mobile 0.3s ease-in-out; }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div id="prologue-screen">
        <img id="prologue-image" src="https://raw.githubusercontent.com/irene0212-a11y/2d/main/2000-removebg-preview.png" class="glow-green" alt="Rimuru">
        <div id="prologue-text"></div>
    </div>

    <div id="game-screen">
        <div id="battle-area">
            <div class="character" id="enemy-container">
                <div>大魔王蜜莉姆 [HP: <span id="enemy-hp-text">10000</span>]</div>
                <div class="hp-bar-container"><div id="enemy-hp-bar" class="hp-bar" style="width: 100%;"></div></div>
                <img id="enemy-img" class="char-img" src="https://raw.githubusercontent.com/irene0212-a11y/2d/main/1000-removebg-preview.png" alt="Milim">
            </div>
            <div class="character" id="player-container">
                <img id="player-img" class="char-img" src="https://raw.githubusercontent.com/irene0212-a11y/2d/main/2000-removebg-preview.png" alt="Rimuru">
                <div>利姆路 (You) [HP: <span id="player-hp-text">150</span>]</div>
                <div class="hp-bar-container"><div id="player-hp-bar" class="hp-bar" style="width: 100%;"></div></div>
            </div>
        </div>

        <div id="terminal-area">
            <div id="action-buttons">
                <button id="btn-attack" onclick="executeAction('attack')">std::attack()</button>
                <button id="btn-heavy" onclick="executeAction('heavy')">sudo rm -rf / [CD:0]</button>
                <button id="btn-stun" onclick="executeAction('stun')">Ctrl+C [CD:0]</button>
                <button id="btn-heal" onclick="executeAction('heal')">debug_heal()</button>
            </div>
            <div id="log-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
